name: Deploy para Hostinger via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Upload via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Gerar area-cliente/.env a partir dos Secrets
        run: |
          {
            echo "; Generated at $(date -u +%Y-%m-%dT%H:%M:%SZ) by GitHub Actions run ${{ github.run_id }}"
            echo "DB_HOST=${{ secrets.DB_HOST }}"
            echo "DB_NAME=${{ secrets.DB_NAME }}"
            echo "DB_USER=${{ secrets.DB_USER }}"
            echo 'DB_PASS="${{ secrets.DB_PASS }}"'
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}"
          } > area-cliente/.env

      - name: Deploy via FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: /domains/vilela.eng.br/public_html/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.bkp
            **/desktop.ini
            **/propostas_sistema.md
            **/README.md
            **/.planning/**
            **/banco de dados/**
            **/debug_*.php
            **/debug_*.html
            **/login_test.php
            **/test_*.php
            **/session_test_*.php
            **/probe.php
            **/seed_test_user.php
            **/hello.php
            area-cliente/tools/**
            area-cliente/client-app/debug_*.php
