name: Deploy para Hostinger via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Upload via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Gerar arquivos de credenciais a partir dos Secrets
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          BUILD_RUN_ID: ${{ github.run_id }}
        run: |
          # 1) Arquivo PHP retornando array — caminho preferido por Database.php.
          #    Hostinger às vezes engole .env/.ini via FTP; arquivos .php sempre passam.
          #    var_export garante escape correto de credenciais com caracteres especiais.
          php -r '
            $data = [
              "DB_HOST"        => getenv("DB_HOST"),
              "DB_NAME"        => getenv("DB_NAME"),
              "DB_USER"        => getenv("DB_USER"),
              "DB_PASS"        => getenv("DB_PASS"),
              "ADMIN_PASSWORD" => getenv("ADMIN_PASSWORD"),
            ];
            $hdr = "<?php\n// Generated by GitHub Actions run " . getenv("BUILD_RUN_ID") . " at " . gmdate("c") . "\n// Do NOT commit. Generated automatically by deploy.yml.\nreturn ";
            file_put_contents("area-cliente/core/db_credentials.php", $hdr . var_export($data, true) . ";\n");
          '

          # 2) Arquivo .env (legacy) — mantido por compatibilidade
          {
            echo "; Generated at $(date -u +%Y-%m-%dT%H:%M:%SZ) by GitHub Actions run ${BUILD_RUN_ID}"
            echo "DB_HOST=${DB_HOST}"
            echo "DB_NAME=${DB_NAME}"
            echo "DB_USER=${DB_USER}"
            echo "DB_PASS=\"${DB_PASS}\""
            echo "ADMIN_PASSWORD=${ADMIN_PASSWORD}"
          } > area-cliente/.env

      - name: Deploy via FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: /domains/vilela.eng.br/public_html/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.bkp
            **/desktop.ini
            **/propostas_sistema.md
            **/README.md
            **/.planning/**
            **/banco de dados/**
            **/debug_*.php
            **/debug_*.html
            **/login_test.php
            **/test_*.php
            **/session_test_*.php
            **/probe.php
            **/seed_test_user.php
            **/hello.php
            area-cliente/tools/**
            area-cliente/client-app/debug_*.php
            # --- Docs internos e artefatos de dev (não devem ir pro servidor) ---
            **/CLAUDE.md
            **/REFORMULACAO-*.md
            **/HANDOFF.md
            **/update_schema_docs.php
            **/setup_credentials.php
            **/.vscode/**
            **/.agents/**
            **/.claude/**
            **/.cursor/**
            **/.codeium/**
            # --- Conteúdo que não faz parte do site (vazou pela raiz da home) ---
            Meu Drive/**
            **/Meu Drive/**
